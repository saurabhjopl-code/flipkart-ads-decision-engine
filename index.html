<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Flipkart Ads Optimization Assistant</title>

<link rel="stylesheet" href="./css/reset.css">
<link rel="stylesheet" href="./css/variables.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/layout.css">

<link rel="icon" href="data:,">

</head>


<body>


<header class="header">

<h1>Flipkart Ads Optimization Assistant</h1>

</header>



<!-- FILTER BAR -->

<div class="filter-bar">

<select id="acc-filter">
<option value="">All ACC</option>
</select>

<select id="month-filter">
<option value="">All Months</option>
</select>

<input type="date" id="start-date">

<input type="date" id="end-date">

<input
type="text"
id="campaign-search"
placeholder="Search campaign..."
onkeyup="searchCampaign()"
>

<button onclick="applyFilters()">Apply</button>

</div>



<!-- LOADER -->

<div id="loader">

<div class="loader-box">

<h2>Loading Ads Data</h2>

<div class="progress-bar">

<div id="progress-fill"></div>

</div>

<p id="progress-text">0%</p>

</div>

</div>



<div class="container">


<!-- SUMMARY -->

<section class="summary">

<div class="card urgent">

<h3>Urgent Issues</h3>

<p id="urgent-count">0</p>

</div>

<div class="card growth">

<h3>Growth Opportunities</h3>

<p id="growth-count">0</p>

</div>

<div class="card optimize">

<h3>Optimizations</h3>

<p id="optimize-count">0</p>

</div>

</section>



<!-- TABS -->

<div class="tabs">

<button class="tab active" onclick="showTab('decision-tab')">
Decision Center
</button>

<button class="tab" onclick="showTab('campaign-tab')">
Campaign Analysis
</button>

<button class="tab" onclick="showTab('keyword-tab')">
Keyword Analysis
</button>

<button class="tab" onclick="showTab('product-tab')">
Product Analysis
</button>

<button class="tab" onclick="showTab('placement-tab')">
Placement Analysis
</button>

</div>



<div class="tab-content">


<div id="decision-tab" class="tab-panel active">

<h2>Decision Center</h2>

<div id="decision-table"></div>

</div>



<div id="campaign-tab" class="tab-panel">

<h2>Campaign Data</h2>

<div id="campaign-table"></div>

</div>



<div id="keyword-tab" class="tab-panel">

<h2>Keyword Data</h2>

<div id="keyword-table"></div>

</div>



<div id="product-tab" class="tab-panel">

<h2>Product Performance</h2>

<div id="product-table"></div>

</div>



<div id="placement-tab" class="tab-panel">

<h2>Placement Performance</h2>

<div id="placement-table"></div>

</div>


</div>


</div>


<script src="./js/ui/tabController.js"></script>

<script type="module" src="./js/binder.js"></script>

</body>

</html>
