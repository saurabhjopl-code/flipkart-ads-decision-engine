<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flipkart Ads Optimization Assistant</title>

<link rel="stylesheet" href="./css/layout.css">

</head>

<body>
  <div id="loading-screen">

<div class="loading-box">

<h2>Loading Flipkart Ads Data...</h2>

<div class="progress-bar">
<div id="progress-fill"></div>
</div>

<p id="progress-text">0%</p>

</div>

</div>

<header class="header">

<div class="logo">
Flipkart Ads Optimization Assistant
</div>

</header>


<div class="container">


<!-- SUMMARY CARDS -->

<section class="summary">

<div class="card urgent">
<h3>Urgent Issues</h3>
<p id="urgent-count">0</p>
</div>

<div class="card growth">
<h3>Growth Opportunities</h3>
<p id="growth-count">0</p>
</div>

<div class="card optimize">
<h3>Optimizations</h3>
<p id="optimize-count">0</p>
</div>

</section>



<!-- DECISION CENTER -->

<section>

<h2>Decision Center</h2>

<div id="decision-table"></div>

</section>



<!-- RAW DATA -->

<section>

<h2>Campaign Data</h2>

<div id="data-table"></div>

</section>

</div>


<script type="module" src="./js/binder.js"></script>

</body>
</html>
